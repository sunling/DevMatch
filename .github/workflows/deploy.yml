name: Deploy to InsForge

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  INSFORGE_PROJECT_ID: c4d95f74-1a12-43b7-a27b-fcd8efbdcf2e
  INSFORGE_API_KEY: ${{ secrets.INSFORGE_API_KEY }}

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_PUBLIC_INSFORGE_BASE_URL: ${{ secrets.NEXT_PUBLIC_INSFORGE_BASE_URL }}
          NEXT_PUBLIC_INSFORGE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_INSFORGE_ANON_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: dist/
      
      - name: Install InsForge CLI
        run: npm install -g @insforge/cli
      
      - name: Deploy to InsForge
        run: |
          cd dist
          zip -r ../deploy.zip .
          cd ..
          insforge deployments deploy --project-id ${{ env.INSFORGE_PROJECT_ID }} --file deploy.zip
